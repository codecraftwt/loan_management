<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Orange gradient background -->
  <defs>
    <linearGradient id="og" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>

  <!-- Rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#og)"/>

  <!-- LH text -->
  <text
    x="16" y="21"
    font-family="system-ui, sans-serif"
    font-size="13"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="-1"
  >LH</text>

  <!-- White dot accent -->
  <circle cx="26" cy="6" r="3.5" fill="white"/>
  <circle cx="26" cy="6" r="2" fill="#f97316"/>
</svg>